services:
  navidrome-spotified:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - /mnt/pool1/apps/navidrome-spotified/app:/app
      - /mnt/pool1/apps/navidrome-spotified/db:/app/db
    ports:
      - 55545:5000
    environment:
      FLASK_SECRET_KEY: "supersecret"
      CIPHER_KEY: "YOUR_FERNET_KEY_HERE"
      AUDIOMUSE_URL: "http://your-audiomuse-service"
      NAVIDROME_URL: "http://your-navidrome-service"
    command: >
      sh -c "pip install --no-cache-dir flask flask_sqlalchemy cryptography requests apscheduler && 
             python app.py"
    restart: unless-stopped